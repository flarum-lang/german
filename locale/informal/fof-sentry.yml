fof-sentry:
  admin:
    sections:
      backend_performance: 'Überwachung der Backend-Leistung'
      backend_performance_help: 'Verfolge die Leistung und Profilerstellung des PHP-Backends. Lege Abtastraten fest, um den Overhead zu steuern.'
      database_monitoring: 'Überwachung von Datenbankabfragen'
      database_monitoring_help: 'Überwache die Leistung von Datenbankabfragen, erkennen langsame Abfragen und N+1-Probleme. Nur aktiv, wenn die Backend-Leistungsüberwachung aktiviert ist.'
      frontend_monitoring: 'Frontend (JavaScript)-Überwachung'
      frontend_monitoring_help: 'JavaScript-Fehler und Frontend-Leistung überwachen. Beachte, dass die Aktivierung bestimmter Funktionen die Paketgröße erhöht.'
      general: 'Allgemeine Einstellungen'
      general_help: 'Konfiguriere deine Sentry-DSN- und Umgebungseinstellungen.'
      user_context: Benutzerkontext
      user_context_help: 'Lege fest, welche Benutzerinformationen mit Fehlerberichten an Sentry gesendet werden.'
    sentry_settings: Sentry-Einstellungen
    settings:
      db_n_plus_one_detection_help: 'Erkenne automatisch N+1-Abfrageprobleme, indem wiederholte Abfragemuster verfolgt werden. N+1-Abfragen treten auf, wenn der Code dieselbe Abfrage mehrmals in einer Schleife ausführt, anstatt geeignete Verknüpfungen oder Eager Loading zu verwenden. Hilft bei der Identifizierung signifikanter Leistungsengpässe.'
      db_n_plus_one_detection_label: 'N+1-Abfrageerkennung aktivieren'
      db_n_plus_one_threshold_help: 'Anzahl der Wiederholungen eines Abfragemusters, die erforderlich sind, damit es als potenzielles N+1-Problem gekennzeichnet wird. Empfindlichkeitsstufen: 5–10 (aggressiv, kann zu Fehlalarmen führen), 10–20 (ausgewogen, empfohlen), 20+ (konservativ, kennzeichnet nur schwerwiegende Probleme). Standardwert: 10.'
      db_n_plus_one_threshold_label: N+1-Erkennungsschwelle
      db_query_sample_rate_help: 'Prozentsatz der Datenbankabfragen, die bei der Leistungsüberwachung verfolgt werden sollen (0–100 %). Auswirkungsstufen: 100 % (alle Abfragen verfolgen, maximale Transparenz, höherer Aufwand), 50 % (die Hälfte verfolgen, ausgewogen), 10–25 % (Teilmenge verfolgen, geringerer Aufwand, erkennt dennoch Probleme), 0 % (nur langsame Abfragen verfolgen, minimaler Aufwand). Hinweis: Langsame Abfragen (über dem Schwellenwert) werden unabhängig von dieser Einstellung IMMER verfolgt. Empfehlung: Verwende 10–25 % auf Websites mit hohem Datenverkehr, um die Auswirkungen auf die Leistung und die Sentry-Datenkosten zu reduzieren.'
      db_query_sample_rate_label: Abfrage-Abtastrate
      db_slow_query_threshold_help: 'Abfragen, die länger als dieser Schwellenwert (in Millisekunden) dauern, werden als langsam gekennzeichnet und unabhängig von der Abtastrate automatisch verfolgt. Schweregrade: Mittel (1-2× Schwellenwert), Hoch (2-5× Schwellenwert), Kritisch (5×+ Schwellenwert). Standard: 1000 ms (1 Sekunde). Für eine aggressivere Erkennung auf 500 ms senken.'
      db_slow_query_threshold_label: 'Schwellenwert für langsame Abfragen (Millisekunden)'
      db_track_bindings_help: 'Füge tatsächliche Parameterwerte in die Abfrageverfolgung ein (z. B. „SELECT * FROM users WHERE id = 123” anstelle von „SELECT * FROM users WHERE id = ?”). Vorteile: Du siehst die genauen Werte, die langsame Abfragen verursachen, und kannst problematische Datenmuster identifizieren. Sicherheits- und Datenschutzhinweis: Es können sensible Benutzerdaten in Sentry offengelegt werden. Passwörter und Hashes (32+ Hexadezimalzeichen) werden automatisch maskiert. Lange Zeichenfolgen (100+ Zeichen) werden gekürzt. Überprüfe deine Datenschutzrichtlinie, bevor du diese Funktion aktivierst. Empfehlung: Nur in der Staging-/Entwicklungsumgebung aktivieren, in der Produktionsumgebung deaktivieren.'
      db_track_bindings_label: 'Werte von Abfrageparametern verfolgen'
      dsn_backend_help: 'Optionaler separater DSN ausschließlich für Backend-Fehler (PHP). Nützlich, um ein anderes Sentry-Projekt für Backend-Fehler zu verwenden, die Weiterleitung über ein Relay für eine verbesserte Leistung zu nutzen oder die Fehlerverfolgung für Frontend und Backend zu trennen. Wenn nicht festgelegt, wird der oben angegebene primäre DSN für beide verwendet.'
      dsn_backend_label: 'Sentry-DSN (nur Backend)'
      dsn_help: 'Der Name deiner Sentry-Datenquelle – die primäre Verbindungs-URL für die Fehlerberichterstattung im Frontend und Backend. Diese findest du in deinen Sentry-Projekteinstellungen. Wichtig: Wenn du einen Relay-DSN verwenden, deaktiviere „User Feedback“, da hierfür ein direkter Zugriff auf Sentry erforderlich ist.'
      dsn_label: Sentry-DSN
      environment_help: 'Kennzeichne alle Ereignisse mit einem Umgebungsnamen (z. B. „Produktion“, „Staging“, „Entwicklung“). Auf diese Weise kannst du Fehler nach Bereitstellungsumgebung filtern und unterschiedliche Alarmregeln für jede Umgebung festlegen.'
      environment_label: 'Sentry Umgebung'
      javascript_console_help: 'Zeichne Aufrufe von console.log, console.info, console.warn und console.error als Breadcrumbs auf. Sieh dir die Abfolge der Ereignisse an, die zu einem Fehler geführt haben, und debugge komplexe Benutzerinteraktionen. Hinweis: Erhöht das Datenvolumen. Verwende diese Funktion in der Produktion nur selektiv.'
      javascript_console_label: 'Konsolenmeldungen als Breadcrumbs erfassen'
      javascript_help: 'Erfasse und melde JavaScript-Fehler aus dem Frontend deines Forums an Sentry. Verfolgt nicht abgefangene Ausnahmen, abgelehnte Versprechen, Konsolenfehler und Netzwerkausfälle. Deaktiviere diese Option, wenn du nur Backend-Fehler verfolgen möchtest.'
      javascript_label: 'JavaScript-Fehlerberichterstattung aktivieren'
      javascript_replays_error_sample_rate: 'Abtastrate für fehlerausgelöste Aufzeichnungen'
      javascript_replays_error_sample_rate_help: 'Prozentsatz der Sitzungen, die nur bei Auftreten eines Fehlers aufgezeichnet werden sollen. Effizienter als vollständige Sitzungswiederholungen – zeichnet bis zu 1 Minute vor dem Fehler auf und fährt bis zum Ende der Sitzung fort. Ideal für die Fehlerbehebung bei Produktionsproblemen. Bundle-Größe: Fügt ~150 KB hinzu. Empfehlung: Verwende 10–25 % in der Produktion.'
      javascript_replays_session_sample_rate: 'Abtastrate für Sitzungsaufzeichnungen'
      javascript_replays_session_sample_rate_help: 'Prozentsatz der Benutzersitzungen, die von Anfang an aufgezeichnet werden sollen. Erfasst Mausbewegungen, Klicks, Bildlauf, Navigation und Formularinteraktionen (mit Maskierung für personenbezogene Daten). Beobachte genau, was Benutzer getan haben, um Fehler zu reproduzieren. Bundle-Größe: Fügt ~150 KB hinzu. Empfehlung: Verwende aufgrund der Speicherkosten 1–5 % in der Produktion.'
      javascript_trace_sample_rate: 'Abtastrate der Frontend-Leistungsüberwachung'
      javascript_trace_sample_rate_help: 'Prozentsatz der zu verfolgenden Seitenaufrufe (0 = deaktiviert, 100 = alle verfolgen). Verfolgt Seitenladezeiten, das Laden von Ressourcen, API-Anfragen und Navigationszeiten. Paketgröße: Fügt ~30 KB hinzu. Empfehlung: Verwende 10–25 % in der Produktion.'
      monitor_performance_help: 'Prozentsatz der zu verfolgenden Backend-Anfragen (0 = deaktiviert, 100 = alle verfolgen). Leistungsüberwachungen umfassen Anfrage-/Antwortzeiten, Datenbankabfragen und Ladezeiten von Erweiterungen. Empfehlung: Beginne mit 10–25 % in der Produktion und 100 % in der Staging-Umgebung. Niedrigere Werte reduzieren das Datenvolumen und die Sentry-Kosten.'
      monitor_performance_label: 'Abtastrate der Backend-Leistungsüberwachung'
      profile_rate_help: 'Prozentsatz der nachverfolgten Transaktionen, die profiliert werden (relativ zur oben genannten Überwachungsrate). Beispiel: Bei einer Überwachungsrate von 10 % und einer Profilierungsrate von 50 % werden 5 % aller Anfragen profiliert. Die Profilierung liefert detaillierte Leistungsdaten auf Funktionsebene. Auswirkungen auf die Leistung: Die Profilierung verursacht zusätzlichen Overhead und erhöht die Antwortzeit. Siehe <a>Sentry-Optimierungsleitfaden</a>. {icon} <bold>Erfordert Excimer-Erweiterung (nur Linux). Derzeit {icon}.</bold>'
      profile_rate_label: 'Abtastrate für Backend-Profiling'
      send_user_emails_help: 'Wenn aktiviert, werden E-Mail-Adressen der Benutzer in alle Sentry-Ereignisse aufgenommen, um Benutzer zu kontaktieren und Fehler zu filtern. Datenschutzhinweis: Überprüfe deine Datenschutzrichtlinie, bevor du diese Option aktivierst. Benutzer-ID, Benutzername und Gruppen werden unabhängig von dieser Einstellung immer berücksichtigt.'
      send_user_emails_label: 'Benutzer-E-Mail-Adressen mit Berichte aufnehmen'
      user_feedback_help: 'Wenn aktiviert, wird Benutzern nach Auftreten eines Fehlers ein Feedback-Formular angezeigt, in dem sie beschreiben können, was passiert ist. Das Formular wird automatisch mit ihrem Benutzernamen, ihrer E-Mail-Adresse (sofern aktiviert) und ihrer Gruppenmitgliedschaft vorausgefüllt. Erstellt einen direkten Kommunikationskanal mit Benutzern, bei denen Probleme auftreten. Erfordert einen direkten Sentry-DSN (keinen Relay-DSN).'
      user_feedback_label: 'Benutzer-Feedback-Dialog aktivieren'
