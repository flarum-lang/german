      discussion: '=> acpl-lscache.ref.purge_cache'
  lib:
    purge_all_success: 'LiteSpeed-Server wurde benachrichtigt, um alle LSCache-Einträge zu löschen.'
    purge_success: 'LiteSpeed-Server wurde benachrichtigt, um LSCache-Einträge zu löschen.'
