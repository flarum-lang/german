    discussionCount: 'Anzahl der Diskussionen'
    emptyReputationHistory: 'Kein Verlauf für diesen Benutzer gefunden...'
    firstLoginModalContent: "<p>\n    Dieses Forum nutzt ein dynamisches Reputationssystem, um positives Engagement innerhalb der Community zu fördern.\n    Als Nutzer kannst du Reputationspunkte sammeln, indem du einen sinnvollen Beitrag zu Diskussionen und Interaktionen leistest, zum Beispiel:\n    <ul>\n      <li>\n        Neue Diskussionen erstellen: Teile deine Gedanken und Ideen mit der Community.\n      </li>\n      <li>\n        Auf Beiträge antworten: Sammle Punkte basierend auf der Qualität deiner Antworten.\n      </li>\n      <li>\n        Benutzer melden: Tragen Sie zur Aufrechterhaltung eines gesunden Umfelds bei, indem Sie unangemessenes Verhalten melden.\n      </li>\n      <li>\n        Likes erhalten: Zeigen Sie Ihre Wertschätzung für die Beiträge anderer und werden Sie dafür belohnt.\n      </li>\n      <li>\n        Beste Antworten verfassen: Sammeln Sie Punkte, indem Sie Antworten beitragen, die ein Problem lösen und als „beste Antwort“ ausgewählt werden.\n      </li>\n    </ul>\n  </p>\n  <p>\n    Verdiene Reputationspunkte, indem du dich positiv verhältst, anderen hilfst und einen Beitrag zur Community leistest. Deine Taten\n    sagen mehr als Worte, und mit jedem Punkt erhältst du Anerkennung für deine Bemühungen. Bleib aktiv und baue deine Reputation auf!\n  </p>\n"
