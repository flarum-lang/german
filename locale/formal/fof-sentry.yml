      environment_label: 'Sentry Umgebung'
      javascript_console_label: 'JavaScript-Konsole erfassen'
      javascript_label: 'JavaScript-Fehler melden'
      javascript_replays_error_sample_rate: 'Front-End-Fehlerwiederholungsrate (0 - 100)'
      javascript_replays_error_sample_rate_help: 'Die Abtastrate für Wiederholungen, die aufgezeichnet werden, wenn ein Fehler auftritt. Bis zu 1 Minute vor dem Fehler wird aufgezeichnet und bis zum Ende der Sitzung fortgesetzt. {br}✱ Wenn du über eine Wiederholungsoption verfügst, erhöht sich die Größe des Pakets um ~150 KB.'
      javascript_replays_session_sample_rate: 'Rate der Sitzungswiederholungen im Frontend (0 - 100)'
