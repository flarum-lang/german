      ssl:
        added_body: 'Super! Ändere nun deine <b>config.php</b> und setze den Wert von <b>„url“</b> auf <b>https</b>!'
        added_heading: 'Okay, ich habe SSL eingerichtet!'
        how_body: 'Für Nutzer eines Webhostings ist es am gängigsten, sich im Webhosting-Panel anzumelden, zu den Hosting-Einstellungen der Website zu gehen und auf „SSL“ zu klicken. Befolge die dortigen Anweisungen, um SSL für deine Website hinzuzufügen. Die meisten Webhosting-Anbieter unterstützen heutzutage den beliebten Zertifikatsaussteller {link}.'
        how_heading: 'Wie füge ich SSL zu meiner Website hinzu?'
