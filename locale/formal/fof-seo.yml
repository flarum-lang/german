        which_extension_heading: 'Welche Erweiterung soll ich installieren?'
        why_body: 'Eine Sitemap ist eine XML-Datei, die eine Liste aller auf deiner Website verfügbaren Seiten enthält. Sie wird von Crawlern und Suchmaschinen genutzt, um Seiten auf deiner Website zu finden.'
