        intro_heading: 'Warum brauche ich eine sichere Verbindung?'
        no_ssl_body: 'In diesem Fall kannst du diese Erweiterung deinstallieren, da Suchmaschinen <b>dein Forum nicht indizieren</b> oder es aus Sicherheitsgründen weit hinter anderen Websites platzieren.'
        no_ssl_heading: 'Was ist, wenn ich kein SSL hinzufügen möchte?'
        rankings_body: 'Wenn es keine sichere Verbindung zu deiner Website gibt, stufen Suchmaschinen deine Website viel niedriger ein als andere Websites oder nehmen sie gar nicht erst in ihren Index auf.'
        rankings_body_ssl: 'Wenn SSL verfügbar ist, erhält deine Website ein besseres Ranking und wird indexiert.'
        rankings_heading: 'Suchmaschinen {icon} sichere Verbindungen'
        what_body: 'Die meisten Menschen kennen <b>https</b>, das für sichere Verbindungen als SSL verwendet wird: <i>Secure Sockets Layer</i>. Offiziell heißt es TLS: <i>Transport Layer Security</i>. Diese Methode wird verwendet, um eine sichere Verbindung zu deinem Webserver herzustellen, wodurch verhindert wird, dass Angreifer oder andere Webserver sich als deine Website ausgeben, und damit deine Besucher geschützt werden. In diesem Fall wird die SSL-Verbindung unterbrochen und die Browser der Besucher warnen den Nutzer, dass die Seite nicht vertrauenswürdig ist.'
        what_heading: 'Was ist SSL oder TLS?'
